services:
  postgres:
    image: postgres:18
    container_name: relaycat-postgres18
    environment:
      POSTGRES_USER: relaycat
      POSTGRES_PASSWORD: relaycat
      POSTGRES_DB: relaycat
    ports:
      - "5432:5432"
    # restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
  minio:
    image: firstfinger/minio:latest
    container_name: relaycat-minio
    environment:
      MINIO_ROOT_USER: relaycat
      MINIO_ROOT_PASSWORD: relaycat
    ports:
      - "9000:9000"
      - "9001:9001"
      - "9002:9002"
    # restart: unless-stopped
    # command: server /data --console-address ":9001"
    volumes:
      # This saves your actual files/buckets permanently
      - minio_data:/data 
      # This saves your mc config, access keys, and system settings permanently!
      - ./minio_config:/root/.minio
  # One-shot: create the bucket + app service account, make media public-read.
  minio-init:
    image: minio/mc:latest
    container_name: relaycat-minio-init
    depends_on:
      minio:
        condition: service_started
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 relaycat relaycat; do
          echo "waiting for minio..."; sleep 2;
        done
        mc mb --ignore-existing local/relaycat
        mc admin user add local relaycat_app relaycat_app || true
        mc admin policy attach local readwrite --user relaycat_app || true
        mc anonymous set download local/relaycat || true
        echo "minio init complete"
  loki:
    image: grafana/loki:latest
    container_name: relaycat-loki
    ports:
      - "3100:3100"
    # restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      # - ./loki-config.yaml:/etc/loki/local-config.yaml
  grafana:
    image: grafana/grafana:latest
    container_name: relaycat-grafana
    ports:
      - "3200:3000"
    # restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
volumes:
  postgres_data:
  minio_data:
  loki_data:
  grafana_data:

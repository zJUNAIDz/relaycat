# =========================================================================
# RelayCat — host nginx (Fedora). Plain HTTP on :80.
# TLS is terminated by Cloudflare (the Tunnel forwards plain HTTP here), so
# nginx only needs server_name routing — no certs, no CORS rewriting.
#
# Install:
#   sudo cp deploy/nginx/relaycat.conf /etc/nginx/conf.d/relaycat.conf
#   sudo nginx -t && sudo systemctl reload nginx
# =========================================================================

# Socket.IO / Next HMR upgrade handling.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream relaycat_web   { server 127.0.0.1:3000; }
upstream relaycat_api   { server 127.0.0.1:8080; }
upstream relaycat_ws    { server 127.0.0.1:4001; }
upstream relaycat_media { server 127.0.0.1:9000; }

# ---- Web (Next.js) : relaycat.zjunaidz.me ----
server {
    listen 80;
    listen [::]:80;
    server_name relaycat.zjunaidz.me;
    client_max_body_size 100m;

    location / {
        proxy_pass http://relaycat_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }
}

# ---- API (Hono) : rcapi.zjunaidz.me ----
server {
    listen 80;
    listen [::]:80;
    server_name rcapi.zjunaidz.me;
    client_max_body_size 100m;

    location / {
        proxy_pass http://relaycat_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ---- WebSocket (Socket.IO) : rcws.zjunaidz.me ----
server {
    listen 80;
    listen [::]:80;
    server_name rcws.zjunaidz.me;

    location / {
        proxy_pass http://relaycat_ws;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# ---- Media (MinIO S3, path-style) : rcmedia.zjunaidz.me ----
server {
    listen 80;
    listen [::]:80;
    server_name rcmedia.zjunaidz.me;
    client_max_body_size 200m; # large uploads via presigned PUT

    location / {
        proxy_pass http://relaycat_media;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 300;
    }
}
